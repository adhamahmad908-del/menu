<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #000; 
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  img {
    max-width: 100%;
    max-height: 100vh;
    object-fit: contain; 
    border-radius: 10px;
  }
</style>
</head>

<body>

<div class="container">
  <img src="photo.png" alt="Menu Photo">
</div>

</body>
</html>
